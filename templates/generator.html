<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صانع الهدايا - عباس</title>
    <style>
        body { background: #050005; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #ff2b6b; padding: 30px; border-radius: 15px; text-align: center; background: #1a001a; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; }
        button { background: #ff2b6b; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h2>صانع الهدايا السحرية ✨</h2>
        <form action="/generate" method="post">
            <input type="text" name="name" placeholder="أدخل اسم الشخص" required>
            <input type="date" name="date" required>
            <button type="submit">توليد الباركود</button>
        </form>
    </div>
</body>
</html>
