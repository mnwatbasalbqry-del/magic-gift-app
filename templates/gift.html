<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى {{ name }} ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #050005; color: white; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; }
        #overlay { position: absolute; inset: 0; background: #050005; z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .heart-btn { font-size: 70px; animation: pulse 1s infinite; filter: drop-shadow(0 0 20px #ff2b6b); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        #container { position: absolute; top: 10%; width: 100%; text-align: center; opacity: 0; transition: 2s; z-index: 200; pointer-events: none; }
        .name-title { font-size: 2.8rem; font-weight: 700; color: #ff2b6b; text-shadow: 0 0 20px #ff2b6b; margin: 5px 0; }
        #lyrics-box { height: 80px; display: flex; align-items: center; justify-content: center; padding: 0 15px; }
        #lyric-text { font-family: 'Amiri', serif; font-size: 1.6rem; color: #fff; text-shadow: 0 0 10px #ff2b6b; text-align: center; }
        canvas { position: absolute; bottom: 0; left: 0; z-index: 10; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body onclick="forcePlay()">

    <audio id="player" preload="auto" loop>
        <source src="/static/song.mp3" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <div class="heart-btn">❤️</div>
        <p style="color:#ff2b6b; margin-top: 20px; font-weight: bold;">اضغط بقوة للتشغيل</p>
    </div>

    <div id="container">
        <div class="name-title">{{ name }}</div>
        <div id="lyrics-box"><div id="lyric-text">...</div></div>
        <div id="timer" style="margin-top: 20px; font-size: 1.2rem; color: #ff2b6b;"></div>
    </div>

    <canvas id="treeCanvas"></canvas>

    <script>
        const audio = document.getElementById('player');
        let started = false;

        function forcePlay() {
            if (started) return;
            started = true;

            // محاولة التشغيل "القسري"
            audio.muted = false;
            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log("اشتغل!");
                }).catch(error => {
                    console.log("المتصفح يمنع التشغيل: ", error);
                    // محاولة أخيرة: كتم ثم تشغيل ثم إلغاء كتم
                    audio.muted = true;
                    audio.play();
                    setTimeout(() => { audio.muted = false; }, 500);
                });
            }

            document.getElementById('overlay').style.display = 'none';
            document.getElementById('container').style.opacity = '1';
            
            initCanvas();
            drawTree(window.innerWidth / 2, window.innerHeight, window.innerHeight * 0.15, 0, 8);
        }

        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function drawTree(x, y, len, angle, width) {
            if (len < 5) return;
            ctx.beginPath();
            ctx.strokeStyle = '#ff2b6b';
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();
            ctx.restore();

            const endX = x + Math.sin(angle * Math.PI / 180) * len;
            const endY = y - Math.cos(angle * Math.PI / 180) * len;

            setTimeout(() => {
                drawTree(endX, endY, len * 0.78, angle + 25 + Math.random() * 10, width * 0.7);
                drawTree(endX, endY, len * 0.78, angle - 25 - Math.random() * 10, width * 0.7);
            }, 100); 
        }
    </script>
</body>
</html>
