<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى {{ name }} ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; background: radial-gradient(circle at center, #1a001a 0%, #050005 100%);
            color: white; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; width: 100vw; 
        }

        #overlay { 
            position: absolute; inset: 0; background: #050005; z-index: 300; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: opacity 1s; 
        }
        .heart-btn { font-size: 60px; animation: pulse 1s infinite; filter: drop-shadow(0 0 15px #ff2b6b); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        #top-container {
            position: absolute; top: 20px; width: 100%; z-index: 200;
            text-align: center; opacity: 0; transition: 1.5s; pointer-events: none;
        }

        .heart-rate-monitor {
            display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 10px;
        }
        .ecg-svg { width: 85%; height: 60px; stroke: #ff2b6b; stroke-width: 3; fill: none; filter: drop-shadow(0 0 5px #ff2b6b); }
        
        .pulse-path {
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: dashMove 2s linear infinite;
        }
        @keyframes dashMove { to { stroke-dashoffset: 0; } }

        .bpm-text { color: #ff2b6b; font-size: 0.9rem; font-weight: bold; text-shadow: 0 0 5px #ff2b6b; margin-top: -5px; }

        .name-title {
            font-size: 2.5rem; font-weight: 700; color: #ff2b6b;
            text-shadow: 0 0 20px rgba(255, 43, 107, 1); margin: 5px 0; 
        }

        .timer { display: flex; gap: 5px; justify-content: center; }
        .box { 
            background: rgba(255, 43, 107, 0.15); border: 1px solid rgba(255, 43, 107, 0.8); 
            padding: 5px 8px; border-radius: 10px; min-width: 45px; 
        }
        .num { font-size: 1.1rem; color: #ff2b6b; font-weight: bold; display: block; }
        .label { font-size: 0.6rem; color: #ccc; }

        #treeCanvas { 
            position: absolute; bottom: 0; left: 0; z-index: 10; 
            pointer-events: none; opacity: 0.3;
        }
    </style>
</head>
<body onclick="initExperience()">

    <audio id="bgMusic" loop preload="auto">
        <source src="https://files.catbox.moe/6gwla0.mpeg" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <div class="heart-btn">❤️</div>
        <p style="color:#ff2b6b; font-weight: bold; margin-top: 10px;">إلمس القلب</p>
    </div>

    <div id="top-container">
        <div class="heart-rate-monitor">
            <svg class="ecg-svg" viewBox="0 0 500 100" preserveAspectRatio="none">
                <path class="pulse-path" d="M0,50 L100,50 L110,40 L120,50 L135,50 L145,10 L160,90 L175,50 L200,50 L300,50 L310,40 L320,50 L335,50 L345,10 L360,90 L375,50 L500,50" />
            </svg>
            <div class="bpm-text">💓 <span id="bpm-val">72</span> BPM</div>
        </div>
        
        <div class="name-title">{{ name }}</div>
        <div id="timer" class="timer"></div>
    </div>

    <canvas id="treeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bgMusic');
        const targetDate = new Date("{{ date }}");
        let active = false;

        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        window.onresize = setup;
        setup();

        function initExperience() {
            if (active) return;
            active = true;

            // تشغيل الصوت
            audio.play().catch(e => {
                console.log("Audio play failed, trying alternative...");
                audio.muted = true;
                audio.play();
                setTimeout(() => { audio.muted = false; }, 500);
            });

            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('top-container').style.opacity = '1';
                // بدء نمو الشجرة من الأسفل
                drawTree(canvas.width / 2, canvas.height, canvas.height * 0.15, 0, 8);
            }, 1000);
            
            setInterval(updateTime, 1000);
            setInterval(updateBPM, 2000);
        }

        // دالة النمو المكتوبة بواسطتك (غصناً غصناً مع تأخير زمني)
        function drawTree(x, y, len, angle, width) {
            if (len < 4) return;

            ctx.beginPath();
            ctx.strokeStyle = '#ff2b6b';
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.moveTo(x, y);

            const nx = x + Math.sin(angle * Math.PI / 180) * len;
            const ny = y - Math.cos(angle * Math.PI / 180) * len;

            ctx.lineTo(nx, ny);
            ctx.stroke();

            setTimeout(() => {
                drawTree(nx, ny, len * 0.78, angle + 25 + Math.random() * 5, width * 0.7);
                drawTree(nx, ny, len * 0.78, angle - 25 - Math.random() * 5, width * 0.7);
            }, 80); // سرعة النمو (80 مللي ثانية)
        }

        function updateBPM() {
            const val = Math.floor(Math.random() * (85 - 72 + 1)) + 72;
            document.getElementById('bpm-val').innerText = val;
        }

        function updateTime() {
            const diff = new Date() - targetDate;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerHTML = `
                <div class="box"><span class="num">${d}</span><span class="label">يوم</span></div>
                <div class="box"><span class="num">${h}</span><span class="label">ساعة</span></div>
                <div class="box"><span class="num">${m}</span><span class="label">دقيقة</span></div>
                <div class="box"><span class="num">${s}</span><span class="label">ثانية</span></div>
            `;
        }
    </script>
</body>
</html>
