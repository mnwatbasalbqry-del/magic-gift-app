<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى نبع الحنان ❤️</title>
    <style>
        body { margin: 0; background: #050005; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .heart { font-size: 80px; animation: beat 1s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        #status { position: fixed; bottom: 10px; width: 100%; text-align: center; color: #ff2b6b; font-size: 12px; z-index: 2000; }
        canvas { position: absolute; inset: 0; z-index: 5; opacity: 0.3; }
        #ui { position: relative; z-index: 10; text-align: center; margin-top: 20%; opacity: 0; transition: 2s; }
    </style>
</head>
<body onclick="start()">

    <div id="overlay">
        <div class="heart">❤️</div>
        <p>إضغط لتشغيل المفاجأة</p>
    </div>

    <div id="status">جاري التحميل...</div>

    <div id="ui">
        <h1 id="nameDisplay" style="font-size: 3rem; color: #ff2b6b;">{{ name }}</h1>
        <div id="lyrics" style="font-size: 1.5rem; margin-top: 20px;"></div>
    </div>

    <canvas id="canvas"></canvas>

    <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('music');
        const status = document.getElementById('status');
        let isStarted = false;

        // فحص حالة الصوت
        audio.oncanplaythrough = () => status.innerText = "جاهز للتشغيل";
        audio.onerror = () => status.innerText = "خطأ: لم يتم العثور على ملف الصوت";

        function start() {
            if (isStarted) return;
            isStarted = true;

            // محاولة التشغيل
            audio.play().then(() => {
                status.innerText = "يعمل الآن ✅";
            }).catch(err => {
                status.innerText = "فشل الصوت: " + err.message;
                // محاولة تشغيل صامتة (Force Play)
                audio.muted = true;
                audio.play();
                setTimeout(() => audio.muted = false, 500);
            });

            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui').style.opacity = '1';
            
            setupCanvas();
            grow(window.innerWidth/2, window.innerHeight, window.innerHeight*0.15, 0, 8);
        }

        const cvs = document.getElementById('canvas');
        const ctx = cvs.getContext('2d');
        function setupCanvas() {
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;
        }

        function grow(x, y, len, angle, w) {
            if (len < 5) return;
            ctx.beginPath();
            ctx.strokeStyle = '#ff2b6b';
            ctx.lineWidth = w;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();
            ctx.restore();

            const nextX = x + Math.sin(angle * Math.PI / 180) * len;
            const nextY = y - Math.cos(angle * Math.PI / 180) * len;

            setTimeout(() => {
                grow(nextX, nextY, len * 0.75, angle + 20, w * 0.7);
                grow(nextX, nextY, len * 0.75, angle - 20, w * 0.7);
            }, 150);
        }
    </script>
</body>
</html>
