<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى {{ name }} ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; background: radial-gradient(circle at center, #220022 0%, #050005 100%);
            color: white; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; width: 100vw; 
        }

        /* واجهة الدخول */
        #overlay { 
            position: absolute; inset: 0; background: #050005; z-index: 300; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: opacity 1s; 
        }
        .heart-btn { font-size: 50px; animation: pulse 1s infinite; filter: drop-shadow(0 0 10px #ff2b6b); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* منطقة العناصر الأمامية (واضحة وقوية) */
        #top-container {
            position: absolute; top: 20px; width: 100%; z-index: 200;
            text-align: center; opacity: 0; transition: 1.5s;
            pointer-events: none;
        }

        /* عداد النبض الحي */
        .pulse-container {
            width: 100%; height: 50px; display: flex; justify-content: center; align-items: center; margin-bottom: 5px;
        }
        .ecg-svg { width: 75%; height: 100%; stroke: #ff2b6b; stroke-width: 3; fill: none; }
        
        .pulse-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dashMove 2.8s linear infinite;
        }
        @keyframes dashMove {
            0% { stroke-dashoffset: 1000; }
            100% { stroke-dashoffset: 0; }
        }

        .name-title {
            font-size: 2.2rem; font-weight: 700; color: #ff2b6b;
            text-shadow: 0 0 15px rgba(255, 43, 107, 0.9); margin: 0; 
        }

        .timer { display: flex; gap: 4px; justify-content: center; margin-top: 10px; }
        .box { 
            background: rgba(255, 43, 107, 0.2); border: 1px solid rgba(255, 43, 107, 0.8); 
            padding: 4px 6px; border-radius: 8px; min-width: 42px; 
        }
        .num { font-size: 1rem; color: #ff2b6b; font-weight: bold; display: block; }
        .label { font-size: 0.5rem; color: #ddd; }

        /* الشجرة (خلفية وباهتة) */
        #treeCanvas { 
            position: absolute; bottom: 0; left: 0; 
            z-index: 10; 
            pointer-events: none; 
            opacity: 0.15; /* بهتان الشجرة بنسبة كبيرة لتكون خلفية فقط */
            filter: blur(0.5px); /* ضبابية خفيفة جداً */
        }
    </style>
</head>
<body onclick="initExperience()">

    <audio id="bgMusic" preload="auto">
        <source src="https://raw.githubusercontent.com/mnwatbasalbqry-del/naba-project/main/_%D8%AD%D8%B3%D9%8A%D9%86_%D8%A7%D9%84%D8%BA%D8%B2%D8%A7%D9%84%20_%D8%A7%D8%BA%D8%A7%D9%86%D9%8A_%D9%85%D8%B3%D8%B1%D8%B9%D9%87%F0%9F%92%A5%20_fyp%20_%D9%87%D9%88%D8%A7%D8%AC%D9%8A%D8%B3%20_%D8%A7%D8%B9%D8%A7%D8%AF%D8%A9_%D8%A7%D9%84%D9%86%D8%B4%D8%B1%F0%9F%94%83%20(MP3).mp3" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <div class="heart-btn">❤️</div>
        <p style="color:#ff2b6b; font-weight: bold; margin-top: 10px;">إلمس القلب</p>
    </div>

    <div id="top-container">
        <div class="pulse-container">
            <svg class="ecg-svg" viewBox="0 0 400 100" preserveAspectRatio="none">
                <path class="pulse-path" d="M0,50 L120,50 L130,20 L145,80 L160,10 L175,90 L190,50 L400,50" />
            </svg>
        </div>
        <div class="name-title">{{ name }}</div>
        <div id="timer" class="timer"></div>
    </div>

    <canvas id="treeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        const targetDate = new Date("{{ date }}");
        let active = false;

        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        window.onresize = setup;
        setup();

        function initExperience() {
            if (active) return;
            active = true;
            document.getElementById('bgMusic').play().catch(() => {});
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('top-container').style.opacity = '1';
                // الشجرة صغيرة جداً (8% فقط من الارتفاع) لتكون مجرد تفصيل خلفي
                drawTree(canvas.width / 2, canvas.height, canvas.height * 0.08, 0, 6);
            }, 1000);
            setInterval(updateTime, 1000);
        }

        function drawTree(x, y, len, angle, width) {
            if (len < 3) return;
            ctx.beginPath();
            ctx.strokeStyle = '#ff2b6b';
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.moveTo(x, y);
            const nx = x + Math.sin(angle * Math.PI / 180) * len;
            const ny = y - Math.cos(angle * Math.PI / 180) * len;
            ctx.lineTo(nx, ny);
            ctx.stroke();
            setTimeout(() => {
                drawTree(nx, ny, len * 0.75, angle + 25 + Math.random() * 5, width * 0.7);
                drawTree(nx, ny, len * 0.75, angle - 25 - Math.random() * 5, width * 0.7);
            }, 50);
        }

        function updateTime() {
            const diff = new Date() - targetDate;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerHTML = `
                <div class="box"><span class="num">${d}</span><span class="label">يوم</span></div>
                <div class="box"><span class="num">${h}</span><span class="label">ساعة</span></div>
                <div class="box"><span class="num">${m}</span><span class="label">دقيقة</span></div>
                <div class="box"><span class="num">${s}</span><span class="label">ثانية</span></div>
            `;
        }
    </script>
</body>
</html>
