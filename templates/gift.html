<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى {{ name }} ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; background: #050005; 
            color: white; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; 
        }

        #overlay { 
            position: absolute; inset: 0; background: #050005; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 1s; 
        }
        .heart-main { font-size: 80px; animation: beat 0.8s infinite; filter: drop-shadow(0 0 20px #ff2b6b); }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        #main-content { opacity: 0; transition: 2s; position: relative; z-index: 10; text-align: center; padding-top: 5vh; }
        
        /* مخطط نبض أكثر ديناميكية */
        .ecg-container { height: 100px; width: 100%; display: flex; justify-content: center; margin-bottom: 10px; }
        .ecg-svg { width: 90%; height: 100%; stroke: #ff2b6b; stroke-width: 4; fill: none; filter: drop-shadow(0 0 8px #ff2b6b); }
        
        .pulse-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 2.5s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: 0; } }

        .name-tag { font-size: 3rem; color: #ff2b6b; text-shadow: 0 0 20px #ff2b6b; margin: 10px 0; font-weight: 700; }
        
        .timer { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
        .box { background: rgba(255, 43, 107, 0.15); border: 1px solid #ff2b6b; padding: 10px; border-radius: 12px; min-width: 55px; }
        .num { font-size: 1.4rem; font-weight: 700; display: block; color: #fff; }
        .label { font-size: 0.7rem; color: #ffb3c1; }

        canvas { position: absolute; inset: 0; pointer-events: none; }
        #treeCanvas { z-index: 5; opacity: 0.5; }
        #bgCanvas { z-index: 1; opacity: 0.7; }
    </style>
</head>
<body onclick="start()">

    <div id="overlay">
        <div class="heart-main">❤️</div>
        <p style="color:#ff2b6b; margin-top: 20px; font-weight: bold;">إلمس القلب لبدء الحكاية</p>
    </div>

    <div id="main-content">
        <div class="ecg-container">
            <svg class="ecg-svg" viewBox="0 0 500 100" preserveAspectRatio="none">
                <path class="pulse-line" d="M0,50 L100,50 L110,30 L120,50 L130,50 L140,10 L155,90 L170,50 L250,50 L260,30 L270,50 L280,50 L290,10 L305,90 L320,50 L500,50" />
            </svg>
        </div>
        <div class="name-tag">{{ name }}</div>
        <div id="timer" class="timer"></div>
        <p id="sub-text" style="color: #ffb3c1; font-style: italic;">جاري تحميل اللحن...</p>
    </div>

    <canvas id="bgCanvas"></canvas>
    <canvas id="treeCanvas"></canvas>

    <script>
        let active = false;
        const audio = new Audio();
        
        // حل خطأ 416: نقوم بتحويل الرابط لـ Blob لضمان تحميله بالكامل وتجنب طلبات Range
        fetch("https://files.catbox.moe/6gwla0.mpeg")
            .then(response => response.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                audio.src = url;
                audio.loop = true;
                if(document.getElementById('sub-text')) {
                    document.getElementById('sub-text').innerText = "كل ثانية وأنتِ النبض...";
                }
            })
            .catch(err => console.error("Audio Load Error:", err));

        function start() {
            if (active) return;
            active = true;

            // تشغيل الصوت بعد تحميل الـ Blob
            audio.play().catch(() => {
                audio.muted = true;
                audio.play();
                setTimeout(() => audio.muted = false, 500);
            });

            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
                initTree();
                initParticles();
            }, 1000);

            setInterval(updateTimer, 1000);
        }

        // --- جزيئات متطايرة حيوية ---
        function initParticles() {
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];

            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.8 + 0.3,
                    opacity: Math.random()
                });
            }

            function animate() {
                ctx.clearRect(0,0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.y -= p.speed;
                    if(p.y < 0) p.y = canvas.height;
                    ctx.fillStyle = `rgba(255, 43, 107, ${p.opacity})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // --- الشجرة المتطورة ---
        function initTree() {
            const canvas = document.getElementById('treeCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            function draw(x, y, len, angle, width) {
                if (len < 5) return;
                ctx.beginPath();
                ctx.strokeStyle = '#ff2b6b';
                ctx.lineWidth = width;
                ctx.lineCap = 'round';
                ctx.moveTo(x, y);
                const nx = x + Math.sin(angle * Math.PI / 180) * len;
                const ny = y - Math.cos(angle * Math.PI / 180) * len;
                ctx.lineTo(nx, ny);
                ctx.stroke();

                setTimeout(() => {
                    draw(nx, ny, len * 0.78, angle + 22 + Math.random()*7, width * 0.7);
                    draw(nx, ny, len * 0.78, angle - 22 - Math.random()*7, width * 0.7);
                }, 60);
            }
            draw(canvas.width/2, canvas.height, canvas.height*0.17, 0, 7);
        }

        function updateTimer() {
            const diff = new Date() - new Date("{{ date }}");
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerHTML = `
                <div class="box"><span class="num">${d}</span><span class="label">يوم</span></div>
                <div class="box"><span class="num">${h}</span><span class="label">ساعة</span></div>
                <div class="box"><span class="num">${m}</span><span class="label">دقيقة</span></div>
                <div class="box"><span class="num">${s}</span><span class="label">ثانية</span></div>
            `;
        }
    </script>
</body>
</html>
