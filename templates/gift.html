<audio id="bgMusic" loop>
    <source src="https://raw.githubusercontent.com/mnwatbasalbqry-del/naba-project/main/%D8%AD%D8%B3%D9%8A%D9%86%20%D0%A7%D9%84%D8%BA%D8%B2%D8%A7%D9%84.mp3" type="audio/mpeg">
</audio>

<script>
    // ... الكود السابق ...

    function initExperience() {
        if (active) return;
        active = true;

        // إصلاح مشكلة الصوت: محاولة تشغيل الصوت مع معالجة القيود
        const audio = document.getElementById('bgMusic');
        audio.volume = 1.0; // التأكد من أن الصوت مسموع
        
        const playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.then(_ => {
                console.log("بدأ التشغيل بنجاح");
            }).catch(error => {
                console.log("المتصفح منع التشغيل التلقائي: " + error);
                // محاولة أخرى في حال الفشل
                audio.play();
            });
        }

        document.getElementById('overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('top-container').style.opacity = '1';
            drawTree(canvas.width / 2, canvas.height, canvas.height * 0.15, 0, 8);
        }, 1000);
        
        setInterval(updateTime, 1000);
        setInterval(updateBPM, 2000);
    }
</script>
