<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى {{ name }} ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background: #050005; color: white; overflow: hidden; 
            font-family: 'Cairo', sans-serif; height: 100vh; width: 100vw; 
        }

        /* واجهة الدخول */
        #overlay { 
            position: absolute; inset: 0; background: #050005; z-index: 200; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: opacity 1s; 
        }
        .heart-btn { font-size: 60px; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* منطقة العناصر العلوية */
        #top-container {
            position: absolute; top: 30px; width: 100%; z-index: 100;
            text-align: center; opacity: 0; transition: 2s;
        }

        /* النبض ECG - تم إصلاح الظهور */
        .ecg-svg { width: 90%; height: 60px; stroke: #ff2b6b; stroke-width: 3; fill: none; }
        .pulse-path {
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: dash 3s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: 0; } }

        .name-title {
            font-size: 2.8rem; font-weight: 700; color: #ff2b6b;
            text-shadow: 0 0 15px rgba(255, 43, 107, 0.7); margin: 5px 0;
        }

        /* العداد المدمج */
        .timer { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }
        .box { 
            background: rgba(255, 43, 107, 0.1); border: 1px solid #ff2b6b; 
            padding: 5px 8px; border-radius: 10px; min-width: 50px; 
        }
        .num { font-size: 1.1rem; color: #ff2b6b; font-weight: bold; display: block; }
        .label { font-size: 0.6rem; color: #ccc; }

        /* الشجرة */
        canvas { position: absolute; bottom: 0; left: 0; z-index: 1; pointer-events: none; }
    </style>
</head>
<body onclick="initExperience()">

    <audio id="bgMusic" preload="auto">
        <source src="https://raw.githubusercontent.com/mnwatbasalbqry-del/naba-project/main/_%D8%AD%D8%B3%D9%8A%D9%86_%D8%A7%D9%84%D8%BA%D8%B2%D8%A7%D9%84%20_%D8%A7%D8%BA%D8%A7%D9%86%D9%8A_%D9%85%D8%B3%D8%B1%D8%B9%D9%87%F0%9F%92%A5%20_fyp%20_%D9%87%D9%88%D8%A7%D8%AC%D9%8A%D8%B3%20_%D8%A7%D8%B9%D8%A7%D8%AF%D8%A9_%D8%A7%D9%84%D9%86%D8%B4%D8%B1%F0%9F%94%83%20(MP3).mp3" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <div class="heart-btn">❤️</div>
        <p style="color:#ff2b6b;">إلمس القلب يا عبقري</p>
    </div>

    <div id="top-container">
        <svg class="ecg-svg" viewBox="0 0 600 100">
            <path class="pulse-path" d="M0,50 L250,50 L260,20 L275,80 L290,10 L305,90 L320,50 L600,50" />
        </svg>
        <div class="name-title">{{ name }}</div>
        <div id="timer" class="timer"></div>
    </div>

    <canvas id="treeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        const targetDate = new Date("{{ date }}");
        let active = false;

        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = setup;
        setup();

        function initExperience() {
            if (active) return;
            active = true;

            document.getElementById('bgMusic').play().catch(() => {});
            document.getElementById('overlay').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('top-container').style.opacity = '1';
                // الشجرة صغيرة (0.12 من طول الشاشة)
                grow(canvas.width / 2, canvas.height, canvas.height * 0.12, 0, 10);
            }, 1000);

            setInterval(tick, 1000);
        }

        function grow(x, y, len, angle, width) {
            if (len < 4) return;
            ctx.beginPath();
            ctx.strokeStyle = '#ff2b6b';
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.moveTo(x, y);
            const nx = x + Math.sin(angle * Math.PI / 180) * len;
            const ny = y - Math.cos(angle * Math.PI / 180) * len;
            ctx.lineTo(nx, ny);
            ctx.stroke();

            setTimeout(() => {
                grow(nx, ny, len * 0.8, angle + 25 + Math.random() * 10, width * 0.7);
                grow(nx, ny, len * 0.8, angle - 25 - Math.random() * 10, width * 0.7);
            }, 60);
        }

        function tick() {
            const now = new Date();
            const diff = now - targetDate;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            
            document.getElementById('timer').innerHTML = `
                <div class="box"><span class="num">${d}</span><span class="label">يوم</span></div>
                <div class="box"><span class="num">${h}</span><span class="label">ساعة</span></div>
                <div class="box"><span class="num">${m}</span><span class="label">دقيقة</span></div>
                <div class="box"><span class="num">${s}</span><span class="label">ثانية</span></div>
            `;
        }
    </script>
</body>
</html>
