<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى الغالية ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; background: #050005; 
            color: white; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; 
        }

        /* واجهة البداية */
        #overlay { 
            position: absolute; inset: 0; background: #050005; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; 
        }
        .heart-icon { font-size: 80px; animation: beat 1s infinite; filter: drop-shadow(0 0 20px #ff2b6b); }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        /* المحتوى الرئيسي */
        #main-ui { position: relative; z-index: 200; text-align: center; margin-top: 8vh; opacity: 0; transition: 3s; pointer-events: none; }
        
        /* نبض القلب ECG */
        .ecg-svg { width: 85%; height: 60px; stroke: #ff2b6b; stroke-width: 3; fill: none; filter: drop-shadow(0 0 8px #ff2b6b); }
        .pulse-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: dash 3s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: 0; } }

        .name-tag { font-size: 3rem; color: #ff2b6b; text-shadow: 0 0 20px #ff2b6b; margin: 10px 0; }
        
        /* صندوق الشعر */
        #lyrics-container { height: 100px; display: flex; align-items: center; justify-content: center; padding: 0 20px; }
        #lyric-text { font-family: 'Amiri', serif; font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px #ff2b6b; text-align: center; transition: 0.5s; }

        /* الشجرة الباهتة في الخلفية */
        canvas { position: absolute; bottom: 0; left: 0; z-index: 10; opacity: 0.25; pointer-events: none; }
    </style>
</head>
<body onclick="startApp()">

    <audio id="musicPlayer" loop preload="auto">
        <source src="{{ url_for('static', filename='song.mp3') }}" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <div class="heart-icon">❤️</div>
        <p style="color:#ff2b6b; margin-top: 20px; font-weight: bold;">إلمس النبض ليبدأ الشعر</p>
    </div>

    <div id="main-ui">
        <svg class="ecg-svg" viewBox="0 0 500 100" preserveAspectRatio="none">
            <path class="pulse-line" d="M0,50 L100,50 L110,20 L120,80 L130,10 L140,90 L150,50 L500,50" />
        </svg>
        <div class="name-tag">{{ name }}</div>
        <div id="lyrics-container">
            <div id="lyric-text">...</div>
        </div>
    </div>

    <canvas id="treeCanvas"></canvas>

    <script>
        const audio = document.getElementById('musicPlayer');
        const lyricText = document.getElementById('lyric-text');
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        let isActive = false;

        // مصفوفة الشعر المتزامنة مع الأغنية
        const poetry = [
            { t: 1, text: "يا نبضاً في وريدي.." },
            { t: 5, text: "يا أجمل أقداري وعيدي" },
            { t: 9, text: "تنمو روحي بقربكِ دوماً" },
            { t: 13, text: "كشجرةٍ تزهرُ في كفيّكِ" }
        ];

        function startApp() {
            if (isActive) return;
            isActive = true;

            // تشغيل الصوت بقوة وتجاوز حظر المتصفحات
            audio.play().catch(() => {
                audio.muted = true;
                audio.play();
                setTimeout(() => { audio.muted = false; }, 500);
            });

            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-ui').style.opacity = '1';
            }, 1000);
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // استدعاء دالة النمو المكتوبة بواسطتك
            drawTree(canvas.width / 2, canvas.height, canvas.height * 0.15, 0, 8);
            
            setInterval(syncPoetry, 100);
        }

        // دالتك المتطورة للنمو التدريجي
        function drawTree(x, y, len, angle, width) {
            if (len < 4) return;

            ctx.save();
            ctx.beginPath();
            ctx.strokeStyle = '#ff2b6b';
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            // النقطة التي ينتهي عندها الغصن الحالي
            const nextX = 0; 
            const nextY = -len;

            setTimeout(() => {
                // رسم الغصون من نقطة النهاية الحالية
                // لاحظ: نستخدم الحسابات النسبية لأننا استخدمنا translate
                drawTree(0, -len, len * 0.75, 25 + Math.random() * 5, width * 0.7);
                drawTree(0, -len, len * 0.75, -25 - Math.random() * 5, width * 0.7);
            }, 100); 

            ctx.restore();
        }

        function syncPoetry() {
            const time = audio.currentTime;
            const currentLine = poetry.find((p, i) => {
                const next = poetry[i+1];
                return time >= p.t && (!next || time < next.t);
            });
            
            if (currentLine && lyricText.innerText !== currentLine.text) {
                lyricText.innerText = currentLine.text;
            }
        }
    </script>
</body>
</html>
