<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى {{ name }} ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; background: #050005; 
            color: white; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; 
        }

        #overlay { 
            position: absolute; inset: 0; background: #050005; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 1s; 
        }
        .heart-main { font-size: 80px; animation: beat 0.8s infinite; filter: drop-shadow(0 0 20px #ff2b6b); }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        #main-content { opacity: 0; transition: 1.5s; position: relative; z-index: 10; text-align: center; padding-top: 5vh; }
        
        /* مخطط نبض متفاعل وسلس */
        .ecg-container { height: 100px; width: 100%; display: flex; justify-content: center; overflow: hidden; }
        .ecg-svg { width: 90%; height: 100%; stroke: #ff2b6b; stroke-width: 4; fill: none; filter: drop-shadow(0 0 8px #ff2b6b); }
        
        .pulse-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 3s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: 0; } }

        .name-tag { font-size: 2.8rem; color: #ff2b6b; text-shadow: 0 0 15px #ff2b6b; margin: 10px 0; font-weight: 700; }
        
        .timer { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
        .box { background: rgba(255, 43, 107, 0.1); border: 1px solid rgba(255, 43, 107, 0.6); padding: 10px; border-radius: 12px; min-width: 50px; }
        .num { font-size: 1.2rem; font-weight: 700; display: block; color: #fff; }
        .label { font-size: 0.6rem; color: #ffb3c1; }

        canvas { position: absolute; inset: 0; pointer-events: none; }
        #treeCanvas { z-index: 5; opacity: 0.4; }
        #bgCanvas { z-index: 1; opacity: 0.5; }
    </style>
</head>
<body onclick="start()">

    <audio id="bgMusic" loop crossorigin="anonymous" preload="auto">
        <source src="https://files.catbox.moe/6gwla0.mpeg" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <div class="heart-main">❤️</div>
        <p style="color:#ff2b6b; margin-top: 20px; font-weight: bold;">إلمس القلب يا عبقري</p>
    </div>

    <div id="main-content">
        <div class="ecg-container">
            <svg class="ecg-svg" viewBox="0 0 500 100" preserveAspectRatio="none">
                <path class="pulse-line" d="M0,50 L100,50 L110,30 L120,50 L130,50 L140,10 L155,90 L170,50 L250,50 L260,30 L270,50 L280,50 L290,10 L305,90 L320,50 L500,50" />
            </svg>
        </div>
        <div class="name-tag">{{ name }}</div>
        <div id="timer" class="timer"></div>
        <p style="color: #ffb3c1; font-style: italic; font-size: 0.9rem;">أنتِ النبض الذي أعيش به...</p>
    </div>

    <canvas id="bgCanvas"></canvas>
    <canvas id="treeCanvas"></canvas>

    <script>
        let active = false;
        const audio = document.getElementById('bgMusic');

        function start() {
            if (active) return;
            active = true;

            // محاولة التشغيل المباشر
            audio.play().then(() => {
                console.log("Audio playing...");
            }).catch(err => {
                console.log("Autoplay blocked, attempting interaction play");
                // في حال فشل، نحاول مرة أخرى بعد تفاعل المستخدم
                audio.muted = false;
                audio.play();
            });

            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
                initTree();
                initParticles();
            }, 800);

            setInterval(updateTimer, 1000);
        }

        function initParticles() {
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];
            for(let i=0; i<40; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
            function animate() {
                ctx.clearRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff2b6b";
                particles.forEach(p => {
                    p.y -= p.speed;
                    if(p.y < 0) p.y = canvas.height;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        function initTree() {
            const canvas = document.getElementById('treeCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            function draw(x, y, len, angle, width) {
                if (len < 5) return;
                ctx.beginPath();
                ctx.strokeStyle = '#ff2b6b';
                ctx.lineWidth = width;
                ctx.lineCap = 'round';
                ctx.moveTo(x, y);
                const nx = x + Math.sin(angle * Math.PI / 180) * len;
                const ny = y - Math.cos(angle * Math.PI / 180) * len;
                ctx.lineTo(nx, ny);
                ctx.stroke();
                setTimeout(() => {
                    draw(nx, ny, len * 0.78, angle + 22 + Math.random()*5, width * 0.7);
                    draw(nx, ny, len * 0.78, angle - 22 - Math.random()*5, width * 0.7);
                }, 70);
            }
            draw(canvas.width/2, canvas.height, canvas.height*0.16, 0, 7);
        }

        function updateTimer() {
            const diff = new Date() - new Date("{{ date }}");
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerHTML = `
                <div class="box"><span class="num">${d}</span><span class="label">يوم</span></div>
                <div class="box"><span class="num">${h}</span><span class="label">ساعة</span></div>
                <div class="box"><span class="num">${m}</span><span class="label">دقيقة</span></div>
                <div class="box"><span class="num">${s}</span><span class="label">ثانية</span></div>
            `;
        }
    </script>
</body>
</html>
