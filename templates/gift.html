<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى {{ name }} ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; background: radial-gradient(circle at center, #1a001a 0%, #050005 100%);
            color: white; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; width: 100vw; 
        }
        #overlay { 
            position: absolute; inset: 0; background: #050005; z-index: 300; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: opacity 1s; 
        }
        .heart-btn { font-size: 60px; animation: pulse 1s infinite; filter: drop-shadow(0 0 15px #ff2b6b); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        #top-container {
            position: absolute; top: 20px; width: 100%; z-index: 200;
            text-align: center; opacity: 0; transition: 1.5s; pointer-events: none;
        }
        .ecg-svg { width: 85%; height: 60px; stroke: #ff2b6b; stroke-width: 3; fill: none; filter: drop-shadow(0 0 5px #ff2b6b); }
        .name-title { font-size: 2.5rem; font-weight: 700; color: #ff2b6b; text-shadow: 0 0 20px rgba(255, 43, 107, 1); margin: 5px 0; }
        .timer { display: flex; gap: 5px; justify-content: center; }
        .box { background: rgba(255, 43, 107, 0.15); border: 1px solid rgba(255, 43, 107, 0.8); padding: 5px 8px; border-radius: 10px; min-width: 45px; }
        .num { font-size: 1.1rem; color: #ff2b6b; font-weight: bold; display: block; }
        canvas { position: absolute; bottom: 0; left: 0; z-index: 10; pointer-events: none; opacity: 0.3; }
    </style>
</head>
<body onclick="initExperience()">

    <div id="overlay">
        <div class="heart-btn">❤️</div>
        <p style="color:#ff2b6b; font-weight: bold; margin-top: 10px;">إلمس القلب للصوت</p>
    </div>

    <div id="top-container">
        <svg class="ecg-svg" viewBox="0 0 500 100" preserveAspectRatio="none">
            <path d="M0,50 L100,50 L110,40 L120,50 L135,50 L145,10 L160,90 L175,50 L500,50" stroke="#ff2b6b" fill="none" />
        </svg>
        <div class="name-title">{{ name }}</div>
        <div id="timer" class="timer"></div>
    </div>

    <canvas id="treeCanvas"></canvas>

    <script>
        // تعريف الصوت برمجياً لضمان الدقة
        const audio = new Audio("https://files.catbox.moe/6gwla0.mpeg");
        audio.loop = true;
        let active = false;

        function initExperience() {
            if (active) return;
            active = true;

            // محاولة التشغيل فور الضغط
            audio.play().then(() => {
                console.log("الصوت يعمل!");
            }).catch(err => {
                // إذا رفض المتصفح، نحاول بطريقة الـ Context
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                audio.play();
            });

            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('top-container').style.opacity = '1';
                setupTree();
            }, 800);
            
            setInterval(updateTime, 1000);
        }

        function setupTree() {
            const canvas = document.getElementById('treeCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            function drawTree(x, y, len, angle, width) {
                if (len < 4) return;
                ctx.beginPath();
                ctx.strokeStyle = '#ff2b6b';
                ctx.lineWidth = width;
                ctx.moveTo(x, y);
                const nx = x + Math.sin(angle * Math.PI / 180) * len;
                const ny = y - Math.cos(angle * Math.PI / 180) * len;
                ctx.lineTo(nx, ny);
                ctx.stroke();
                setTimeout(() => {
                    drawTree(nx, ny, len * 0.78, angle + 25 + Math.random() * 5, width * 0.7);
                    drawTree(nx, ny, len * 0.78, angle - 25 - Math.random() * 5, width * 0.7);
                }, 80);
            }
            drawTree(canvas.width / 2, canvas.height, canvas.height * 0.15, 0, 8);
        }

        function updateTime() {
            // ملاحظة: تأكد من تمرير التاريخ بشكل صحيح من Flask
            const diff = new Date() - new Date("{{ date }}");
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerHTML = `
                <div class="box"><span class="num">${d}</span> يوم</div>
                <div class="box"><span class="num">${h}</span> ساعة</div>
                <div class="box"><span class="num">${m}</span> دقيقة</div>
                <div class="box"><span class="num">${s}</span> ثانية</div>
            `;
        }
    </script>
</body>
</html>
